<!DOCTYPE html>
<html>
<head>
    <title>🧳 Travel Risk Advisor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e3f2fd; 
            color: #212121;
            text-align: center;
            padding: 50px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 40px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0077c2;
            font-size: 2em;
        }

        select, button {
            padding: 12px;
            margin-top: 20px;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        select {
            background-color: #f0f8ff;
            color: #212121;
        }

        button {
            background-color: #0288d1;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0277bd;
        }

        .advice-box {
            margin-top: 30px;
            background-color: #e1f5fe;
            padding: 20px;
            border-radius: 10px;
            color: #212121;
            text-align: left;
        }

        .emoji {
            font-size: 1.5em;
            margin-right: 5px;
        }
    </style>
</head>
